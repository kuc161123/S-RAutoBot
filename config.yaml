bybit:
  alt_base_url: https://api.bytick.com
  api_key: ${BYBIT_API_KEY}
  api_secret: ${BYBIT_API_SECRET}
  base_url: https://api.bybit.com
  use_alt_on_fail: true
  ws_public: wss://stream.bybit.com/v5/public/linear
  ws_public_alt: wss://stream.bytick.com/v5/public/linear
telegram:
  token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
execution:
  enabled: true
  entry_slippage_pct: 0.0003
  fee_pct: 0.0006
indicators:
  atr_period: 14
  ema_periods:
  - 200
  rsi_period: 14
legacy:
  partial_take_profit: false
  scalp_mode: false
  trailing_stop: false
  volume_filter: false
  vwap_filter: false
monitoring:
  health_check: true
  heartbeat_interval_sec: 3600
notifications:
  daily_summary: true
  entry: true
  exit: true
  pending_signals: true
  startup: true
risk:
  max_daily_loss: 0.1
  max_position_size_pct: 0.15
  risk_per_trade: 0.012
  # [VALIDATED 2026-06] Net-directional exposure cap: block a new entry if it would push
  # |open long risk - open short risk| above this fraction of equity. Caps correlated
  # one-sided (net-short) blowups. Validated to cut max drawdown ~30-40pts across bull+bear
  # OOS windows with equal-or-better return. Set null/0 to disable.
  net_directional_cap: 0.10
  # [VALIDATED 2026-06] BTC short-gate: skip SHORT entries when BTC 1H close is above its
  # 200 EMA (market uptrend) — your short book bleeds/gets squeezed in bull/relief rallies.
  # Longs are unaffected. Set false to disable.
  btc_short_gate: true
  # [VALIDATED 2026-06] Bull long-boost: multiply LONG per-trade risk by this factor when
  # BTC 1H close is above its 200 EMA (market uptrend) — the profitable side in a bull.
  # Validated to lift bull-market long returns ~20% (86% of bull windows) at ~equal
  # drawdown, neutral in bears. 1.0 = off; 1.3 = validated sweet spot (higher = overfit risk).
  long_bull_boost: 1.3
  taper_schedule:
  - - 1500
    - 0.007
  - - 2000
    - 0.006
  - - 3000
    - 0.0055
  - - 5000
    - 0.005
  - - 8000
    - 0.0045
  - - 12000
    - 0.004
  - - 20000
    - 0.0035
  - - 40000
    - 0.003
